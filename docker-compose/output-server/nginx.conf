server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    location / {
        autoindex on;              # Enable directory listing
        autoindex_exact_size off;  # Show file sizes in KB/MB instead of bytes
        autoindex_localtime on;    # Show local time instead of GMT
        charset utf-8;             # Use UTF-8 encoding
    }

    # Disable access log for health checks
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

